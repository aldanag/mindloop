<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="32" fill="#111111"/>
  <!-- Stylized Perplexity-inspired compass/star -->
  <g transform="translate(100,100)">
    <!-- Vertical bar -->
    <rect x="-3" y="-60" width="6" height="120" fill="white" opacity="0.9"/>
    <!-- Horizontal bar -->
    <rect x="-60" y="-3" width="120" height="6" fill="white" opacity="0.9"/>
    <!-- Diamond points -->
    <polygon points="0,-60 14,-14 0,-30 -14,-14" fill="white" opacity="0.6"/>
    <polygon points="60,0 14,14 30,0 14,-14" fill="white" opacity="0.6"/>
    <polygon points="0,60 -14,14 0,30 14,14" fill="white" opacity="0.6"/>
    <polygon points="-60,0 -14,-14 -30,0 -14,14" fill="white" opacity="0.6"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="10" fill="#111111"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
  </g>
</svg>
