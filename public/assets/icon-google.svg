<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="32" fill="#111111"/>
  <!-- Stylized Google G letterform -->
  <g transform="translate(100,100)">
    <!-- G arc -->
    <path
      d="M48,-16 A52,52 0 1,0 52,10"
      stroke="white"
      stroke-width="10"
      fill="none"
      stroke-linecap="round"
      opacity="0.9"
    />
    <!-- G crossbar -->
    <path
      d="M10,10 L52,10"
      stroke="white"
      stroke-width="10"
      fill="none"
      stroke-linecap="round"
      opacity="0.9"
    />
    <!-- Spark / AI indicator dots -->
    <circle cx="60" cy="-52" r="4" fill="white" opacity="0.5"/>
    <circle cx="70" cy="-44" r="3" fill="white" opacity="0.35"/>
    <circle cx="52" cy="-60" r="3" fill="white" opacity="0.35"/>
  </g>
</svg>
